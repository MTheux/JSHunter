<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#111111"/>
    </linearGradient>
    <linearGradient id="redGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#dc2626"/>
      <stop offset="100%" style="stop-color:#b91c1c"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- Top red bar -->
  <rect x="50" y="30" width="700" height="35" rx="2" fill="none" stroke="#dc2626" stroke-width="1.5"/>
  <text x="400" y="53" text-anchor="middle" fill="#dc2626" font-family="monospace" font-size="13" font-weight="bold" letter-spacing="4">[ JAVASCRIPT SECURITY ARSENAL ]</text>

  <!-- Main title -->
  <text x="400" y="150" text-anchor="middle" fill="#ffffff" font-family="Arial Black, sans-serif" font-size="72" font-weight="900" letter-spacing="6">JS</text>
  <text x="400" y="230" text-anchor="middle" fill="#dc2626" font-family="Arial Black, sans-serif" font-size="80" font-weight="900" letter-spacing="4">HUNTER</text>

  <!-- Version -->
  <text x="400" y="260" text-anchor="middle" fill="#666666" font-family="monospace" font-size="14">v2.0 — PYTHON</text>

  <!-- Subtitle -->
